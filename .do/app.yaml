# DigitalOcean App Platform Specification
# Deploy: doctl apps create --spec app.yaml

name: clyr-mlm
region: fra1

services:
  # Node.js Backend API
  - name: api
    github:
      repo: YOUR_USERNAME/clyr-mlm
      branch: main
      deploy_on_push: true
    source_dir: server
    run_command: npm start
    build_command: npm install
    environment_slug: node-js
    http_port: 5000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
        preserve_path_prefix: true
    health_check:
      http_path: /api/health
      initial_delay_seconds: 10
      period_seconds: 30
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: JWT_REFRESH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_HOST
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_PASS
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_FROM
        value: "noreply@clyr.de"
      - key: FRONTEND_URL
        value: "${APP_URL}"
      - key: DO_SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_BUCKET
        value: "clyr-uploads"
      - key: DO_SPACES_REGION
        value: "fra1"
      - key: DO_SPACES_ENDPOINT
        value: "https://fra1.digitaloceanspaces.com"

# React Frontend Static Site
static_sites:
  - name: web
    github:
      repo: YOUR_USERNAME/clyr-mlm
      branch: main
      deploy_on_push: true
    source_dir: client
    build_command: npm install && npm run build
    output_dir: dist
    catchall_document: index.html
    routes:
      - path: /
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: "${APP_URL}/api"

# Managed Database (PostgreSQL)
databases:
  - name: clyr-db
    engine: PG
    version: "15"
    size: db-s-1vcpu-1gb
    num_nodes: 1
